<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plano Cartesiano Interativo</title>
    <style>
      * { box-sizing: border-box; }

      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: #eeeeee;
      }

      .container {
        display: flex;
        gap: 10px;
        background-color: #f5f5f5;
        padding: 10px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.18);
        width: 96vw;
        max-width: 980px;
        min-height: 86vh;
        position: relative;
      }

      .left-panel {
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex: 1 1 520px;
        min-width: 0;
      }

      .graph-container {
        position: relative;
        width: min(60vw, 500px);
        aspect-ratio: 1 / 1;
        background-color: #ffffff;
        border: 2px solid #000;
        overflow: hidden;
        touch-action: none;
      }

      canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      #cursorTooltip {
        position: absolute;
        display: none;
        pointer-events: none;
        background: rgba(0, 0, 0, 0.78);
        color: #fff;
        padding: 4px 7px;
        border-radius: 5px;
        font-size: 11px;
        white-space: nowrap;
        z-index: 10;
        transform: translate(8px, 12px);
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 7px;
        width: 310px;
        flex: 0 0 310px;
        font-size: 13px;
      }

      .expression {
        font-size: 1.05em;
        font-weight: bold;
        text-align: center;
        background: #fff;
        border-radius: 8px;
        padding: 7px;
      }

      .additional-info {
        font-size: 0.82em;
        color: #b00000;
        text-align: center;
      }

      .tangent-box,
      .sliders,
      .table,
      .point-input,
      .buttons {
        background: #ffffff;
        border: 1px solid #d0d0d0;
        border-radius: 8px;
        padding: 7px;
      }

      .tangent-box h3,
      .table h3 {
        margin: 0 0 5px 0;
        font-size: 0.95em;
        text-align: center;
      }

      .tangent-box {
        line-height: 1.25;
      }

      .tangent-line {
        font-weight: bold;
        text-align: center;
        margin-top: 3px;
      }

      .slider-container {
        display: grid;
        grid-template-columns: 95px 1fr 42px;
        gap: 5px;
        align-items: center;
        margin-bottom: 4px;
      }

      .slider-container input[type="range"] {
        width: 100%;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.78em;
      }

      th,
      td {
        border: 1px solid #000;
        padding: 3px;
        text-align: center;
      }

      .table {
        max-height: 190px;
        overflow: auto;
      }

      .highlight {
        background-color: #eeeeee;
      }

      .point-input {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 5px;
      }

      .point-input input {
        width: 100%;
        min-width: 0;
      }

      .buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 5px;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
        border: 1px solid #999;
        border-radius: 6px;
        background: #f7f7f7;
        padding: 5px 7px;
      }

      .top-actions {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .image-container {
        position: absolute;
        bottom: 8px;
        right: 8px;
        opacity: 0.75;
      }

      .image-container img {
        width: 120px;
        max-width: 22vw;
      }

      .version-tag {
        position: fixed;
        right: 10px;
        bottom: 10px;
        background: #222222;
        color: #ffffff;
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 12px;
        z-index: 9999;
        opacity: 0.9;
      }

      @media (max-width: 820px) {
        body { align-items: flex-start; }
        .container {
          flex-direction: column;
          width: 100vw;
          min-height: 100vh;
          border-radius: 0;
        }
        .graph-container {
          width: 100%;
          max-width: none;
        }
        .controls {
          width: 100%;
          flex: 0 0 auto;
        }
        .image-container { display: none; }
        .table { max-height: 150px; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="left-panel">
        <div class="top-actions">
          <button id="createPointBtn">Criar ponto no gráfico</button>
          <small>Dê dois cliques em um ponto para selecioná-lo.</small>
        </div>
        <div class="graph-container" id="graphContainer">
          <canvas id="graphCanvas" width="500" height="500"></canvas>
          <div id="cursorTooltip"></div>
        </div>
      </div>

      <div class="controls">
        <div class="expression" id="expression">y = ax + b</div>
        <div class="additional-info" id="additionalInfo"></div>

        <div class="tangent-box" id="tangentBox">
          <h3>Tangente da reta</h3>
          <div id="tangentInfo">Selecione dois pontos e trace a reta.</div>
        </div>

        <div id="sliders" class="sliders">
          <div class="slider-container">
            <label for="aRange">Coef. a:</label>
            <input type="range" id="aRange" min="-5" max="5" step="0.1" value="1" disabled />
            <span id="aValue">1</span>
          </div>
          <div class="slider-container">
            <label for="bRange">Coef. b:</label>
            <input type="range" id="bRange" min="-5" max="5" step="0.1" value="0" disabled />
            <span id="bValue">0</span>
          </div>
          <div class="slider-container">
            <label for="zoomSelect">Zoom:</label>
            <select id="zoomSelect">
              <option value="0.25">0,25x</option>
              <option value="0.5">0,5x</option>
              <option value="1" selected>1x</option>
              <option value="2">2x</option>
            </select>
            <span id="zoomValue">1x</span>
          </div>
        </div>

        <div class="table">
          <h3>Tabela de Valores</h3>
          <table>
            <thead>
              <tr><th>x</th><th>y</th></tr>
            </thead>
            <tbody id="valueTable"></tbody>
          </table>
        </div>

        <div class="point-input">
          <input type="number" id="xPoint" placeholder="x" />
          <input type="number" id="yPoint" placeholder="y" />
          <button onclick="addPoint()">Adicionar</button>
        </div>

        <div class="buttons">
          <button onclick="drawLineFromPoints()">Traçar reta</button>
          <button onclick="clearPoints()">Apagar dados</button>
        </div>
      </div>

      <div class="image-container">
        <a href="https://ibb.co/WWTt7CV">
          <img src="https://i.ibb.co/bgfJYtb/Apresenta-o-de-Slides-Corporativo-Preto-e-Amarelo.png" alt="Apresentação Corporativa" border="0" />
        </a>
      </div>
    </div>

    <div class="version-tag" id="versionTag">Plano Cartesiano Interativo • V1</div>

    <script>
      const APP_VERSION = "V1";
      const STORAGE_KEY = "planoCartesianoInterativoV1";

      let zoomLevel = 1;
      let points = [];
      let selectedPoints = [];
      let lineDrawn = false;
      let a = 1;
      let b = 0;
      let movingPoint = null;
      let creatingPoint = false;

      const canvas = document.getElementById("graphCanvas");
      const ctx = canvas.getContext("2d");
      const graphContainer = document.getElementById("graphContainer");
      const cursorTooltip = document.getElementById("cursorTooltip");

      document.getElementById("versionTag").textContent =
        `Plano Cartesiano Interativo • ${APP_VERSION}`;

      canvas.addEventListener("mousedown", handleMouseDown);
      canvas.addEventListener("mouseup", handleMouseUp);
      canvas.addEventListener("mouseleave", () => {
        movingPoint = null;
        hideTooltip();
      });
      canvas.addEventListener("mousemove", handleMouseMove);
      canvas.addEventListener("dblclick", handleDoubleClick);
      canvas.addEventListener("click", handleCanvasClick);

      window.addEventListener("resize", drawGraph);

      function saveState() {
        const state = {
          zoomLevel,
          points,
          selectedPointIndexes: selectedPoints.map((p) => points.indexOf(p)),
          lineDrawn,
          a,
          b,
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function loadState() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return;
        try {
          const state = JSON.parse(saved);
          zoomLevel = state.zoomLevel ?? 1;
          points = Array.isArray(state.points) ? state.points : [];
          lineDrawn = Boolean(state.lineDrawn);
          a = state.a ?? 1;
          b = state.b ?? 0;
          selectedPoints = Array.isArray(state.selectedPointIndexes)
            ? state.selectedPointIndexes.map((index) => points[index]).filter(Boolean)
            : [];
        } catch (error) {
          console.warn("Não foi possível carregar os dados salvos.", error);
        }
      }

      function syncControls() {
        document.getElementById("zoomSelect").value = String(zoomLevel);
        document.getElementById("zoomValue").textContent = `${zoomLevel}x`;

        if (a !== null) {
          document.getElementById("aRange").value = a;
          document.getElementById("aValue").textContent = a.toFixed(2);
        } else {
          document.getElementById("aValue").textContent = "--";
        }

        document.getElementById("bRange").value = b;
        document.getElementById("bValue").textContent = b.toFixed(2);
        document.getElementById("aRange").disabled = !lineDrawn || a === null;
        document.getElementById("bRange").disabled = !lineDrawn || a === null;
      }

      function formatNumber(value) {
        if (!Number.isFinite(value)) return "--";
        return value.toFixed(2);
      }

      function graphToCanvas(point) {
        const scale = 50 * zoomLevel;
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        return {
          x: centerX + point.x * scale,
          y: centerY - point.y * scale,
        };
      }

      function canvasToGraph(offsetX, offsetY) {
        const scale = 50 * zoomLevel;
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        return {
          x: (offsetX - centerX) / scale,
          y: (centerY - offsetY) / scale,
        };
      }

      function getEventCanvasPosition(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
          offsetX: (e.clientX - rect.left) * scaleX,
          offsetY: (e.clientY - rect.top) * scaleY,
          cssX: e.clientX - rect.left,
          cssY: e.clientY - rect.top,
        };
      }

      function updateTangentInfo() {
        const tangentInfo = document.getElementById("tangentInfo");
        if (!lineDrawn || selectedPoints.length !== 2) {
          tangentInfo.innerHTML = "Selecione dois pontos e trace a reta.";
          return;
        }

        const p1 = selectedPoints[0];
        const p2 = selectedPoints[1];
        const deltaX = p2.x - p1.x;
        const deltaY = p2.y - p1.y;

        if (Math.abs(deltaX) < 0.000001) {
          tangentInfo.innerHTML = `
            <div>A reta é vertical.</div>
            <div>Δx = 0. A tangente não está definida.</div>
          `;
          return;
        }

        const tangent = deltaY / deltaX;
        tangentInfo.innerHTML = `
          <div>Δy = y₂ - y₁ = ${formatNumber(deltaY)}</div>
          <div>Δx = x₂ - x₁ = ${formatNumber(deltaX)}</div>
          <div class="tangent-line">tg(α) = Δy / Δx = ${formatNumber(deltaY)} / ${formatNumber(deltaX)} = ${formatNumber(tangent)}</div>
          <div>Coeficiente angular: a = ${formatNumber(tangent)}</div>
        `;
      }

      function handleMouseDown(e) {
        const pos = getEventCanvasPosition(e);
        const clicked = canvasToGraph(pos.offsetX, pos.offsetY);
        let clickedPoint = null;

        points.forEach((point) => {
          const dist = Math.hypot(point.x - clicked.x, point.y - clicked.y);
          if (dist < 0.2) clickedPoint = point;
        });

        if (clickedPoint) movingPoint = clickedPoint;
      }

      function handleMouseUp() {
        movingPoint = null;
      }

      function handleMouseMove(e) {
        const pos = getEventCanvasPosition(e);
        const graphPoint = canvasToGraph(pos.offsetX, pos.offsetY);

        if (movingPoint) {
          movingPoint.x = graphPoint.x;
          movingPoint.y = graphPoint.y;

          if (selectedPoints.includes(movingPoint)) {
            calculateLineFromSelectedPoints();
          }

          refreshAll();
          saveState();
        } else {
          updateLineTooltip(pos);
        }
      }

      function handleDoubleClick(e) {
        const pos = getEventCanvasPosition(e);
        const clicked = canvasToGraph(pos.offsetX, pos.offsetY);
        let clickedPoint = null;

        points.forEach((point) => {
          const dist = Math.hypot(point.x - clicked.x, point.y - clicked.y);
          if (dist < 0.2) clickedPoint = point;
        });

        if (!clickedPoint) return;

        if (selectedPoints.includes(clickedPoint)) {
          selectedPoints = selectedPoints.filter((p) => p !== clickedPoint);
        } else if (selectedPoints.length < 2) {
          selectedPoints.push(clickedPoint);
        }

        refreshAll();
        saveState();
      }

      function handleCanvasClick(e) {
        if (!creatingPoint) return;
        const pos = getEventCanvasPosition(e);
        const point = canvasToGraph(pos.offsetX, pos.offsetY);
        points.push(point);
        creatingPoint = false;
        document.getElementById("createPointBtn").textContent = "Criar ponto no gráfico";
        refreshAll();
        saveState();
      }

      function updateLineTooltip(pos) {
        if (!lineDrawn) {
          hideTooltip();
          return;
        }

        const graphPoint = canvasToGraph(pos.offsetX, pos.offsetY);
        let linePoint;
        let distancePx;

        if (a === null) {
          linePoint = { x: b, y: graphPoint.y };
          const screen = graphToCanvas(linePoint);
          distancePx = Math.abs(pos.offsetX - screen.x);
        } else {
          linePoint = { x: graphPoint.x, y: a * graphPoint.x + b };
          const screen = graphToCanvas(linePoint);
          distancePx = Math.abs(pos.offsetY - screen.y);
        }

        if (distancePx <= 10) {
          cursorTooltip.style.left = `${pos.cssX}px`;
          cursorTooltip.style.top = `${pos.cssY}px`;
          cursorTooltip.textContent = `(${formatNumber(linePoint.x)}, ${formatNumber(linePoint.y)})`;
          cursorTooltip.style.display = "block";
        } else {
          hideTooltip();
        }
      }

      function hideTooltip() {
        cursorTooltip.style.display = "none";
      }

      function drawGrid(scale) {
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        ctx.strokeStyle = "#ddd";
        ctx.lineWidth = 1;

        for (let x = -centerX; x <= centerX; x += scale) {
          ctx.beginPath();
          ctx.moveTo(centerX + x, 0);
          ctx.lineTo(centerX + x, canvas.height);
          ctx.stroke();
        }

        for (let y = -centerY; y <= centerY; y += scale) {
          ctx.beginPath();
          ctx.moveTo(0, centerY + y);
          ctx.lineTo(canvas.width, centerY + y);
          ctx.stroke();
        }

        ctx.strokeStyle = "black";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(centerX, 0);
        ctx.lineTo(centerX, canvas.height);
        ctx.moveTo(0, centerY);
        ctx.lineTo(canvas.width, centerY);
        ctx.stroke();

        ctx.fillStyle = "black";
        ctx.font = "10px Arial";
        for (let x = -centerX; x <= centerX; x += scale) {
          const value = (x / scale).toFixed(0);
          ctx.fillText(value, centerX + x - 10, centerY + 15);
        }

        for (let y = -centerY; y <= centerY; y += scale) {
          const value = -(y / scale).toFixed(0);
          if (value !== "0") ctx.fillText(value, centerX + 5, centerY + y + 5);
        }
      }

      function drawPoints(scale) {
        points.forEach((point) => {
          const screen = graphToCanvas(point);
          ctx.beginPath();
          ctx.arc(screen.x, screen.y, 5, 0, Math.PI * 2);
          ctx.fillStyle = selectedPoints.includes(point) ? "orange" : "blue";
          ctx.fill();

          if (selectedPoints.includes(point)) {
            ctx.strokeStyle = "black";
            ctx.lineWidth = 2;
            ctx.stroke();
          }
        });
      }

      function calculateLineFromSelectedPoints() {
        if (selectedPoints.length !== 2) return false;
        const p1 = selectedPoints[0];
        const p2 = selectedPoints[1];

        if (Math.abs(p1.x - p2.x) > 0.000001) {
          a = (p2.y - p1.y) / (p2.x - p1.x);
          b = p1.y - a * p1.x;
        } else {
          a = null;
          b = p1.x;
        }
        lineDrawn = true;
        return true;
      }

      function drawLineFromPoints() {
        if (!calculateLineFromSelectedPoints()) return;
        refreshAll();
        saveState();
      }

      function drawGraph() {
        const scale = 50 * zoomLevel;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawGrid(scale);
        drawLine(scale);
        drawTangentTriangle();
        drawPoints(scale);
      }

      function drawLine(scale) {
        if (!lineDrawn) return;
        ctx.strokeStyle = "red";
        ctx.lineWidth = 2;
        ctx.beginPath();

        const startX = -canvas.width / 2 / scale;
        const endX = canvas.width / 2 / scale;

        if (a === null) {
          const x = canvas.width / 2 + b * scale;
          ctx.moveTo(x, 0);
          ctx.lineTo(x, canvas.height);
        } else {
          ctx.moveTo(canvas.width / 2 + startX * scale, canvas.height / 2 - (a * startX + b) * scale);
          ctx.lineTo(canvas.width / 2 + endX * scale, canvas.height / 2 - (a * endX + b) * scale);
        }
        ctx.stroke();
      }

      function drawTangentTriangle() {
        if (!lineDrawn || selectedPoints.length !== 2 || a === null) return;

        const p1 = selectedPoints[0];
        const p2 = selectedPoints[1];
        const deltaX = p2.x - p1.x;
        const deltaY = p2.y - p1.y;
        if (Math.abs(deltaX) < 0.000001 || Math.abs(deltaY) < 0.000001) return;

        const baseEnd = { x: p2.x, y: p1.y };
        const s1 = graphToCanvas(p1);
        const s2 = graphToCanvas(p2);
        const sBase = graphToCanvas(baseEnd);

        ctx.save();
        ctx.setLineDash([6, 4]);
        ctx.strokeStyle = "#d05a87";
        ctx.lineWidth = 1.5;

        ctx.beginPath();
        ctx.moveTo(s1.x, s1.y);
        ctx.lineTo(sBase.x, sBase.y);
        ctx.lineTo(s2.x, s2.y);
        ctx.stroke();

        ctx.setLineDash([]);
        ctx.fillStyle = "rgba(220, 90, 135, 0.12)";
        ctx.beginPath();
        ctx.moveTo(s1.x, s1.y);
        ctx.lineTo(sBase.x, sBase.y);
        ctx.lineTo(s2.x, s2.y);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#b03a68";
        ctx.font = "12px Arial";
        ctx.fillText("Δx", (s1.x + sBase.x) / 2 - 8, sBase.y + 16);
        ctx.fillText("Δy", sBase.x + 6, (sBase.y + s2.y) / 2);

        drawAngleArc(s1, p1, p2);
        ctx.restore();
      }

      function drawAngleArc(originScreen, p1, p2) {
        const angle = Math.atan2(-(p2.y - p1.y), p2.x - p1.x);
        const radius = 28;
        ctx.strokeStyle = "#333";
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        if (p2.x >= p1.x) {
          ctx.arc(originScreen.x, originScreen.y, radius, 0, angle, angle < 0);
        } else {
          ctx.arc(originScreen.x, originScreen.y, radius, Math.PI, angle, angle > Math.PI);
        }
        ctx.stroke();
        ctx.fillStyle = "#333";
        ctx.font = "13px Arial";
        ctx.fillText("α", originScreen.x + 32, originScreen.y - 10);
      }

      function formatEquation(a, b) {
        const aText = a.toFixed(2);
        if (b < 0) return `y = ${aText}x - ${Math.abs(b).toFixed(2)}`;
        if (b > 0) return `y = ${aText}x + ${b.toFixed(2)}`;
        return `y = ${aText}x`;
      }

      function updateExpression() {
        const additionalInfo = document.getElementById("additionalInfo");
        const expression = document.getElementById("expression");

        if (!lineDrawn) {
          expression.textContent = "y = ax + b";
          additionalInfo.textContent = "";
          return;
        }

        if (a === null) {
          expression.textContent = `x = ${b.toFixed(2)}`;
          additionalInfo.textContent = "A reta vertical não representa uma função.";
        } else {
          expression.textContent = formatEquation(a, b);
          additionalInfo.textContent = "";
        }
      }

      function updateTable() {
        const tableBody = document.getElementById("valueTable");
        tableBody.innerHTML = "";
        points.forEach((point) => {
          const row = document.createElement("tr");
          const xCell = document.createElement("td");
          const yCell = document.createElement("td");
          xCell.textContent = point.x.toFixed(2);
          yCell.textContent = point.y.toFixed(2);
          row.appendChild(xCell);
          row.appendChild(yCell);
          tableBody.appendChild(row);
        });
        highlightOffLinePoints();
      }

      function highlightOffLinePoints() {
        if (!lineDrawn) return;
        const table = document.getElementById("valueTable");
        table.querySelectorAll("tr").forEach((row, index) => {
          const point = points[index];
          const errorMargin = 0.001;
          const isOffLine = a === null
            ? Math.abs(point.x - b) > errorMargin
            : Math.abs(point.y - (a * point.x + b)) > errorMargin;
          row.classList.toggle("highlight", isOffLine);
        });
      }

      function addPoint() {
        const x = parseFloat(document.getElementById("xPoint").value);
        const y = parseFloat(document.getElementById("yPoint").value);
        if (!isNaN(x) && !isNaN(y)) {
          points.push({ x, y });
          document.getElementById("xPoint").value = "";
          document.getElementById("yPoint").value = "";
          refreshAll();
          saveState();
        }
      }

      function clearPoints() {
        const confirmar = confirm("Tem certeza que deseja apagar os pontos e os dados salvos?");
        if (!confirmar) return;

        points = [];
        selectedPoints = [];
        lineDrawn = false;
        a = 1;
        b = 0;
        zoomLevel = 1;
        localStorage.removeItem(STORAGE_KEY);
        refreshAll();
      }

      document.getElementById("zoomSelect").addEventListener("change", function () {
        zoomLevel = parseFloat(this.value);
        refreshAll();
        saveState();
      });

      document.getElementById("aRange").addEventListener("input", function () {
        a = parseFloat(this.value);
        lineDrawn = true;
        updateSelectedPointsBasedOnLine();
        refreshAll();
        saveState();
      });

      document.getElementById("bRange").addEventListener("input", function () {
        b = parseFloat(this.value);
        lineDrawn = true;
        updateSelectedPointsBasedOnLine();
        refreshAll();
        saveState();
      });

      document.getElementById("createPointBtn").addEventListener("click", function () {
        creatingPoint = !creatingPoint;
        this.textContent = creatingPoint ? "Clique no gráfico" : "Criar ponto no gráfico";
      });

      function updateSelectedPointsBasedOnLine() {
        if (selectedPoints.length !== 2 || a === null) return;
        selectedPoints.forEach((point) => {
          point.y = a * point.x + b;
        });
      }

      function refreshAll() {
        syncControls();
        updateExpression();
        updateTable();
        updateTangentInfo();
        drawGraph();
      }

      loadState();
      refreshAll();
    </script>
  </body>
</html>
